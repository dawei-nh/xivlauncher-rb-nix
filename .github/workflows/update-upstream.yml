name: Update Upstream Release

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-upstream-release
  cancel-in-progress: false

jobs:
  update:
    name: Open update PR
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      UPDATE_BRANCH: automation/update-xivlauncher-rb
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update upstream lock files
        run: UPDATE_VERIFY=0 ./scripts/update.sh

      - name: Open or update pull request
        run: |
          if git diff --quiet -- flake.lock deps.json; then
            echo "No upstream update available."
            exit 0
          fi

          tag="rb-v$(nix eval --raw .#packages.x86_64-linux.xivlauncher-rb.version)"

          git checkout -B "$UPDATE_BRANCH"
          git add flake.lock deps.json
          git commit -m "Update XIVLauncher-RB to ${tag}"
          git push --force-with-lease origin "$UPDATE_BRANCH"

          body="$(mktemp)"
          cat > "$body" <<EOF
          ## Summary

          - Updates \`xivlauncher-core-src\` to upstream release \`${tag}\`
          - Regenerates \`deps.json\` with \`UPDATE_VERIFY=0 ./scripts/update.sh\`

          ## Validation

          Full package validation runs in the \`Nix CI\` pull request workflow before auto-merge.
          EOF

          existing_pr="$(gh pr list --head "$UPDATE_BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" \
              --title "Update XIVLauncher-RB to ${tag}" \
              --body-file "$body"
            pr="$existing_pr"
          else
            gh pr create \
              --base main \
              --head "$UPDATE_BRANCH" \
              --title "Update XIVLauncher-RB to ${tag}" \
              --body-file "$body"
            pr="$(gh pr list --head "$UPDATE_BRANCH" --base main --state open --json number --jq '.[0].number')"
          fi

          auto_merge_enabled="$(gh pr view "$pr" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge is already enabled for PR #${pr}."
          else
            gh pr merge "$pr" --auto --squash --delete-branch
          fi
