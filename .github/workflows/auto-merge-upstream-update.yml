name: Auto-merge Upstream Update

on:
  workflow_run:
    workflows:
      - Nix CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge validated update PR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      GH_TOKEN: ${{ secrets.UPDATE_BOT_TOKEN || github.token }}
      UPDATE_BRANCH: automation/update-xivlauncher-rb

    steps:
      - name: Merge update PR
        run: |
          prs="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq ".[] | select(.state == \"open\" and .base.ref == \"main\" and .head.ref == \"${UPDATE_BRANCH}\") | .number")"

          if [[ -z "$prs" ]]; then
            echo "No open upstream update PR found for this workflow run."
            exit 0
          fi

          for pr in $prs; do
            gh pr merge "$pr" --squash --delete-branch
          done
