name: Nix CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Test updater script
        run: bash tests/update.sh

      - name: Test workflow automation
        run: bash tests/workflows.sh

      - name: Check shell syntax
        run: bash -n scripts/update.sh tests/update.sh tests/workflows.sh

      - name: Check flake
        run: nix flake check

      - name: Build package
        run: nix build .#xivlauncher-rb --out-link result-package

      - name: Inspect package output
        run: |
          test -x result-package/bin/xivlauncher-rb
          test -x result-package/bin/XIVLauncher.Core
          find -L result-package -maxdepth 3 -type f | sort
